<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Civic Earth Dashboard v2</title>

<style>

:root{
    --bg:#0b0f17;
    --panel:#121a2a;
    --panel2:#0f1626;
    --border:#22314d;
    --accent:#4da3ff;
    --text:#e6f0ff;
    --muted:#8ea7d8;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI,Arial,sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    background:var(--panel);
    padding:18px;
    text-align:center;
    border-bottom:1px solid var(--border);
}

header h1{
    font-size:1.2rem;
}

header p{
    color:var(--muted);
    margin-top:6px;
    font-size:.85rem;
}

.status-bar{
    background:var(--panel2);
    border-bottom:1px solid var(--border);
    padding:8px 16px;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    font-size:.85rem;
}

.status{
    display:flex;
    align-items:center;
    gap:8px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#3adb76;
}

.tabs{
    display:flex;
    flex-wrap:wrap;
    background:var(--panel2);
    border-bottom:1px solid var(--border);
}

.tab{
    padding:12px 18px;
    cursor:pointer;
    color:#9db8ff;
    transition:.2s;
}

.tab:hover{
    background:#18233c;
}

.tab.active{
    border-bottom:3px solid var(--accent);
    color:white;
}

.content{
    flex:1;
    position:relative;
}

.panel{
    position:absolute;
    inset:0;
    display:none;
}

.panel.active{
    display:block;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:white;
}

.loading{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
}

.survey-fallback{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100%;
    text-align:center;
    gap:15px;
}

.button{
    background:var(--accent);
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:8px;
}

footer{
    background:var(--panel2);
    border-top:1px solid var(--border);
    text-align:center;
    padding:10px;
    color:var(--muted);
    font-size:.8rem;
}

@media(max-width:768px){

.tabs{
    justify-content:center;
}

.tab{
    flex:1 1 45%;
    text-align:center;
}

}

</style>

</head>

<body>

<header>
    <h1>🌍 Civic Earth Dashboard</h1>
    <p>Open Science • Community Resilience • Civic Intelligence</p>
</header>

<div class="status-bar">


<div class="status">
    <div class="dot"></div>
    System Online
</div>

<div id="clock"></div>


</div>

<div class="tabs">


<div class="tab active" onclick="showTab(0)">

</div>

<div class="tab" onclick="showTab(1)">
    🌐 GeoMag Alert
</div>

<div class="tab" onclick="showTab(2)">
    🎨 Mood Art
</div>

<div class="tab" onclick="showTab(3)">
    📋 Survey Hub
</div>


</div>

<div class="content">

```

<div class="panel">

</div>

<div class="panel">
    <iframe
    src="https://culturecareonline.blogspot.com/2026/05/geomagnetic-mood-art.html">

</div>

<div class="panel">

        

        <p>

        <a

            Open Survey
        </a>

    </div>

</div>
```

</div>

<footer>
    Civic Earth Dashboard v2 • Systems Monday Civic Lab • CultureCare.online
</footer>

<script>

function showTab(index){

    const panels=document.querySelectorAll('.panel');
    const tabs=document.querySelectorAll('.tab');

    panels.forEach((panel,i)=>{
        panel.classList.toggle('active',i===index);
    });

    tabs.forEach((tab,i)=>{
        tab.classList.toggle('active',i===index);
    });

}

function updateClock(){

    document.getElementById("clock").innerHTML=
    new Date().toLocaleString();

}

setInterval(updateClock,1000);
updateClock();

setTimeout(()=>{

    const surveyFrame =
    document.getElementById("surveyFrame");

    try{

        let test =
        surveyFrame.contentWindow.location.href;

    }catch(e){

        document.getElementById(
        "surveyFallback"
        ).style.display="flex";

    }

},4000);

</script>

</body>
</html>
