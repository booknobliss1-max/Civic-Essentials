<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Civic Earth Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f17;
        color: #e6f0ff;
    }

    header {
        padding: 20px;
        background: #121a2a;
        text-align: center;
        border-bottom: 1px solid #22314d;
    }

    header h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 1px;
    }

    .tabs {
        display: flex;
        justify-content: center;
        background: #0f1626;
        border-bottom: 1px solid #22314d;
    }

    .tab {
        padding: 12px 18px;
        cursor: pointer;
        color: #a9c1ff;
        border-bottom: 3px solid transparent;
    }

    .tab:hover {
        background: #16213a;
    }

    .tab.active {
        border-bottom: 3px solid #4da3ff;
        color: white;
    }

    .content {
        height: calc(100vh - 110px);
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: white;
    }

    .footer {
        text-align: center;
        font-size: 12px;
        padding: 8px;
        background: #0f1626;
        border-top: 1px solid #22314d;
        color: #7f9ad1;
    }
</style>
</head>

<body>

<header>
    <h1>🌍 Civic Earth Dashboard — Open Science + Community Signal System</h1>
</header>

<div class="tabs">
    <div class="tab active" onclick="switchTab(0)">Pod Mapping</div>
    <div class="tab" onclick="switchTab(1)">GeoMag Alert</div>
    <div class="tab" onclick="switchTab(2)">Mood Art</div>
</div>

<div class="content">
    <!-- POD MAPPING -->
    <iframe id="frame0" src="https://booknobliss1-max.github.io/Pod-Mapping/"></iframe>

    <!-- GEOMAG ALERT -->
    <iframe id="frame1" style="display:none;" src="https://booknobliss1-max.github.io/GeoMag-Alert/"></iframe>

    <!-- MOOD ART -->
    <iframe id="frame2" style="display:none;" src="https://culturecareonline.blogspot.com/2026/05/geomagnetic-mood-art.html"></iframe>
</div>

<div class="footer">
    Civic Earth Dashboard • Open Science Prototype • GitHub Pages Ready
</div>

<script>
function switchTab(index) {
    const frames = document.querySelectorAll("iframe");
    const tabs = document.querySelectorAll(".tab");

    frames.forEach((f, i) => {
        f.style.display = (i === index) ? "block" : "none";
    });

    tabs.forEach((t, i) => {
        t.classList.toggle("active", i === index);
    });
}
</script>

</body>
</html>
